services:
  backend:
    image: skyengine-backend:latest
    build:
      context: .
      dockerfile: application/dockerfile/backend.Dockerfile
      network: host
    container_name: skyengine-backend
    ports:
      - "8233:8000"
    volumes:
      - ./application:/app/application
      - ./executor:/app/executor
      - ./config:/app/config
      - ./dataset:/app/dataset
      - /app/.venv
      # Docker Socket — 用于 DockerProxy 按需启停 SkyEngine compose 栈
      - /var/run/docker.sock:/var/run/docker.sock
      # SkyEngine 配置文件 — 提供 docker-compose-online.yaml
      - ${SKYENGINE_COMPOSE_PATH:-/data1/home/wuhao/project/finalpro/SkyEngine/docker-compose-online.yaml}:/opt/skyengine/docker-compose-online.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
      # SkyEngine 在线服务 compose 文件路径，容器内路径固定为 /opt/skyengine/docker-compose-online.yaml
      - SKYENGINE_COMPOSE_PATH=/opt/skyengine/docker-compose-online.yaml
      # SkyEngine 项目根目录路径，本机路径为 /data1/home/wuhao/project/finalpro/SkyEngine, docker compose启动服务需要读取宿主机路径。
      - SKYENGINE_PROJECT_DIR=${SKYENGINE_PROJECT_DIR:-/data1/home/wuhao/project/finalpro/SkyEngine}
      - ENGINE_URL=http://engine:8080
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    networks:
      - skyengine-network
    restart: unless-stopped

  frontend:
    image: skyengine-frontend:latest
    build:
      context: .
      dockerfile: application/dockerfile/frontend.Dockerfile
      network: host
    container_name: skyengine-frontend
    ports:
      - "5180:5173"
    volumes:
      - ./application/frontend:/app
      - /app/node_modules
    environment:
      - PYTHONUNBUFFERED=1
      # - 若本机则使用 http://rag-helper:8000
      - RAG_BACKEND_URL=${RAG_BACKEND_URL:-http://114.212.82.168:8000}
    depends_on:
      - backend
      # - rag-helper
    networks:
      - skyengine-network
    restart: unless-stopped

